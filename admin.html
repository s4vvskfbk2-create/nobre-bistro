function isHoje(criadoEm){

  var d=new Date();
  var dd=String(d.getDate()).padStart(2,"0");
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var yyyy=d.getFullYear();
  var pat1=dd+"/"+mm+"/"+yyyy;
  var pat2=dd+"/"+mm+",";
  var pat3=dd+"/"+mm+" ";
  return criadoEm.indexOf(pat1)===0||criadoEm.indexOf(pat2)===0||criadoEm.indexOf(pat3)===0;
}

        h("button",{onClick:function(){excluirReceita(r.id);},style:{flex:1,background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:9,padding:"10px 0",fontSize:12,fontWeight:700,cursor:"pointer"}},"Excluir")
      )
    );
  }

  return h("div",{style:{padding:14}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("h2",{style:{margin:0,fontSize:17,fontWeight:900,fontFamily:"Georgia,serif"}},"Receitas"),
      h("div",{style:{display:"flex",alignItems:"center",gap:6}},
        h("span",{style:{fontSize:10,color:"#888"}},"CMV alvo:"),
        h("input",{type:"number",value:cmvAlvo,onChange:function(e){setCmvAlvo(parseInt(e.target.value)||30);},style:{width:46,border:"1.5px solid "+B,borderRadius:7,padding:"4px 6px",fontSize:12,fontWeight:700,color:R,outline:"none",textAlign:"center"}}),
        h("span",{style:{fontSize:10,color:"#888"}},"%")
      )
    ),
    h("div",{style:{display:"flex",gap:5,marginBottom:14}},
      ABAS.map(function(a){var at=aba===a[0];return h("button",{key:a[0],onClick:function(){setAba(a[0]);},style:{flex:1,padding:"7px 0",borderRadius:9,border:"1.5px solid "+(at?R:B),background:at?R:"#fff",color:at?"#fff":"#666",fontSize:11,fontWeight:at?800:600,cursor:"pointer"}},a[1]);})
    ),

    aba==="lista"&&h("div",null,
      loading&&h("p",{style:{textAlign:"center",color:"#ccc",padding:"30px 0"}},"Carregando..."),
      !loading&&receitas.length===0&&h("div",{style:{textAlign:"center",padding:"3rem",background:C,borderRadius:12}},
        h("p",{style:{margin:0,fontWeight:700,color:"#555"}},"Nenhuma receita cadastrada"),
        h("p",{style:{margin:"4px 0 0",fontSize:12,color:"#aaa"}},"Clique em Nova Receita para comecar")
      ),
      !loading&&receitas.map(function(r){
        var cmvPct=r.cmv_percentual||0;
        var cor=cmvCor(cmvPct);
        return h("div",{key:r.id,onClick:function(){setSel(r);},style:{background:"#fff",borderRadius:11,border:"1px solid "+B,padding:"11px 13px",marginBottom:8,cursor:"pointer"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
            h("p",{style:{margin:0,fontWeight:800,fontSize:13}},r.nome),
            h("span",{style:{background:cor+"18",color:cor,fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20}},cmvPct.toFixed(1)+"%"),
            h("div",{style:{display:"flex",gap:4}},
              h("button",{onClick:function(e){e.stopPropagation();editarReceita(r);},style:{background:"#2563eb",color:"#fff",border:"none",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}},"Editar"),
              h("button",{onClick:function(e){e.stopPropagation();excluirReceita(r.id);},style:{background:"#ef4444",color:"#fff",border:"none",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}},"Excluir")
            )
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888"}},
            h("span",null,"Venda: "+fmt(r.preco_venda)),
            h("span",null,"Custo: "+fmt(r.custo_total)),
            h("span",null,"Rend: "+(r.rendimento||1)+" porcao"+(r.rendimento>1?"s":""))
          ),
          h("div",{style:{background:"#f0f0f0",borderRadius:4,height:4,marginTop:6,overflow:"hidden"}},
            h("div",{style:{height:"100%",width:Math.min(100,cmvPct)+"%",background:cor,borderRadius:4}})
          )
        );
      })

    aba==="nova"&&h("div",null,
      formOk&&h("div",{style:{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"12px",marginBottom:12,textAlign:"center",fontWeight:700,color:"#15803d"}},"Receita salva com sucesso!"),
      h("div",{style:{background:"#fff",borderRadius:11,border:"1px solid "+B,padding:12,marginBottom:10}},
        h("p",{style:{margin:"0 0 8px",fontWeight:700,fontSize:12}},"Dados da Receita"),
        h("input",{placeholder:"Nome da receita *",value:formRec.nome,onChange:function(e){setFormRec(Object.assign({},formRec,{nome:e.target.value}));},style:{width:"100%",border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:6,boxSizing:"border-box"}}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}},
          h("input",{placeholder:"Categoria",value:formRec.categoria,onChange:function(e){setFormRec(Object.assign({},formRec,{categoria:e.target.value}));},style:{border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",boxSizing:"border-box"}}),
          h("input",{placeholder:"Rendimento (porcoes)",type:"number",value:formRec.rendimento,onChange:function(e){setFormRec(Object.assign({},formRec,{rendimento:e.target.value}));},style:{border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",boxSizing:"border-box"}})
        ),
        h("input",{placeholder:"Preco de venda R$ *",type:"number",value:formRec.preco_venda,onChange:function(e){setFormRec(Object.assign({},formRec,{preco_venda:e.target.value}));},style:{width:"100%",border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:6,boxSizing:"border-box"}}),
        h("textarea",{placeholder:"Observacoes (modo de preparo, etc)",value:formRec.observacoes,onChange:function(e){setFormRec(Object.assign({},formRec,{observacoes:e.target.value}));},rows:2,style:{width:"100%",border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",resize:"none",boxSizing:"border-box"}})
      ),
      (itensFormValidos.length>0||precoFormAtual>0)&&h("div",{style:{background:cmvCor(cmvFormAtual)+"18",border:"1px solid "+cmvCor(cmvFormAtual)+"44",borderRadius:10,padding:"10px 12px",marginBottom:10}},
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
(function(){
            var rend=parseFloat(formRec.rendimento)||1;
            var custoPorcao=rend>0?custoFormAtual/rend:0;
            var items=[
              ["Custo total",fmt(custoFormAtual)],
              ["Custo/porcao ("+rend+"x)",fmt(custoPorcao)],
              ["CMV atual",cmvFormAtual.toFixed(1)+"%"],
              ["Preco sugerido",precoSugerido>0?fmt(precoSugerido):"--"]
            ];
            return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
              items.map(function(a){
                return h("div",{key:a[0],style:{textAlign:"center",background:"rgba(255,255,255,0.6)",borderRadius:7,padding:"6px 4px"}},
                  h("p",{style:{margin:0,fontSize:8,color:"#555",textTransform:"uppercase"}},a[0]),
                  h("p",{style:{margin:"2px 0 0",fontWeight:900,fontSize:12,color:cmvCor(cmvFormAtual)}},a[1])
                );
              })
            );
          })()
        )
      ),
      h("div",{style:{background:"#fff",borderRadius:11,border:"1px solid "+B,padding:12,marginBottom:10}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("p",{style:{margin:0,fontWeight:700,fontSize:12}},"Ingredientes ("+(formItens.length)+")"),
          h("button",{onClick:addItemForm,style:{background:R,color:"#fff",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}},"+ Add")
        ),
        ingredientes.length===0&&h("p",{style:{fontSize:11,color:"#f59e0b",margin:0}},"Cadastre ingredientes primeiro na aba Ingredientes"),
        formItens.map(function(it,idx){
          var tipo=it.tipo||"ingrediente";
          return h("div",{key:idx,style:{marginBottom:8,background:"#f9fafb",borderRadius:8,padding:"8px"}},
            h("div",{style:{display:"flex",gap:4,marginBottom:5}},
              [["ingrediente","Ingrediente"],["sub_receita","Sub-Receita"]].map(function(tp){
                var at=tipo===tp[0];
                return h("button",{key:tp[0],onClick:function(){updItemForm(idx,"tipo",tp[0]);},
                  style:{flex:1,padding:"4px 0",borderRadius:6,border:"1.5px solid "+(at?R:B),background:at?R:"#fff",color:at?"#fff":"#666",fontSize:10,fontWeight:at?700:500,cursor:"pointer"}},tp[1]);
              })
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 70px 28px",gap:5}},
              tipo==="ingrediente"
                ?h("select",{value:it.ingrediente_id||"",onChange:function(e){updItemForm(idx,"ingrediente_id",e.target.value);},style:{border:"1.5px solid "+B,borderRadius:7,padding:"6px 8px",fontSize:12,outline:"none",background:"#fff"}},
                    h("option",{value:""},"Escolha o ingrediente..."),
                    ingredientes.map(function(ing){return h("option",{key:ing.id,value:ing.id},ing.nome+" ("+fmt(ing.custo_unitario)+"/"+ing.unidade+")");})
                  )
                :h("select",{value:it.sub_receita_id||"",onChange:function(e){updItemForm(idx,"sub_receita_id",e.target.value);},style:{border:"1.5px solid "+B,borderRadius:7,padding:"6px 8px",fontSize:12,outline:"none",background:"#fff"}},
                    h("option",{value:""},"Escolha a sub-receita..."),
                    receitas.map(function(r){return h("option",{key:r.id,value:r.id},r.nome+" (custo: "+fmt(r.custo_total)+")");})
                  ),
              h("input",{type:"number",placeholder:"Qtd",value:it.quantidade||"",onChange:function(e){updItemForm(idx,"quantidade",e.target.value);},style:{border:"1.5px solid "+B,borderRadius:7,padding:"6px 8px",fontSize:12,outline:"none"}}),
              h("button",{onClick:function(){remItemForm(idx);},style:{background:"#fee2e2",border:"none",borderRadius:7,color:"#dc2626",fontWeight:700,cursor:"pointer",fontSize:14}},"x")
            )
          );
        })
      ),
      formErro&&h("p",{style:{color:"#dc2626",fontSize:12,marginBottom:8}},formErro),
      h("button",{onClick:salvarReceita,disabled:salvando,style:{width:"100%",background:salvando?"#ccc":R,color:"#fff",border:"none",borderRadius:10,padding:"13px 0",fontSize:13,fontWeight:800,cursor:salvando?"not-allowed":"pointer"}},salvando?"Salvando...":"Salvar Receita")
    ),

    aba==="ingredientes"&&h("div",null,
      h("div",{style:{background:"#fff",borderRadius:11,border:"1px solid "+B,padding:12,marginBottom:12}},
        h("p",{style:{margin:"0 0 8px",fontWeight:700,fontSize:12}},"Novo Ingrediente"),
        h("input",{placeholder:"Nome *",value:formIng.nome,onChange:function(e){setFormIng(Object.assign({},formIng,{nome:e.target.value}));},style:{width:"100%",border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:6,boxSizing:"border-box"}}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}},
          h("select",{value:formIng.unidade,onChange:function(e){setFormIng(Object.assign({},formIng,{unidade:e.target.value}));},style:{border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",background:"#fff"}},
            ["g","kg","ml","l","un","porcao"].map(function(u){return h("option",{key:u,value:u},u);})
          ),
          h("input",{placeholder:"Categoria",value:formIng.categoria,onChange:function(e){setFormIng(Object.assign({},formIng,{categoria:e.target.value}));},style:{border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",boxSizing:"border-box"}})
        ),
        h("input",{placeholder:"Custo unitario R$ *",type:"number",value:formIng.custo_unitario,onChange:function(e){setFormIng(Object.assign({},formIng,{custo_unitario:e.target.value}));},style:{width:"100%",border:"1.5px solid "+B,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}),
        erroIng==="ok"?h("p",{style:{color:"#16a34a",fontSize:12,fontWeight:700,marginBottom:6}},"Ingrediente salvo!"):erroIng&&h("p",{style:{color:"#dc2626",fontSize:12,marginBottom:6}},erroIng),
        h("button",{onClick:salvarIngrediente,disabled:salvandoIng,style:{width:"100%",background:salvandoIng?"#ccc":R,color:"#fff",border:"none",borderRadius:9,padding:"10px 0",fontSize:12,fontWeight:700,cursor:salvandoIng?"not-allowed":"pointer"}},salvandoIng?"Salvando...":"Salvar Ingrediente")
      ),
      h("p",{style:{fontWeight:700,fontSize:12,marginBottom:6}},"Ingredientes cadastrados ("+ingredientes.length+")"),
      ingredientes.length===0&&h("p",{style:{color:"#ccc",fontSize:12,textAlign:"center",padding:"20px 0"}},"Nenhum ingrediente cadastrado"),
      ingredientes.map(function(ing){
        return h("div",{key:ing.id,style:{background:"#fff",borderRadius:9,border:"1px solid "+B,padding:"8px 11px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",null,
            h("p",{style:{margin:0,fontWeight:700,fontSize:12}},ing.nome),
            h("p",{style:{margin:"1px 0 0",fontSize:10,color:"#aaa"}},(ing.categoria||"Sem categoria")+" - "+ing.unidade)
          ),
          h("p",{style:{margin:0,fontWeight:800,fontSize:13,color:R}},fmt(ing.custo_unitario)+"/"+ing.unidade)
        );
      })
    )
  );
}
