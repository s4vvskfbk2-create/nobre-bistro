          h("input",{type:"password",value:pass,onChange:function(e){setPass(e.target.value);},onKeyDown:function(e){if(e.key==="Enter"){if(pass==="nobre2025")setNivel("gerente");else if(pass==="balcao")setNivel("atendente");else if(pass==="cozinha")setNivel("cozinha");else{setErr(true);setTimeout(function(){setErr(false);},2000);}setPass("");}},placeholder:"Digite sua senha",autoFocus:true,style:{width:"100%",border:"1.5px solid "+(err?"#fca5a5":B),borderRadius:10,padding:"11px 13px",fontSize:16,outline:"none",boxSizing:"border-box",letterSpacing:2}}),
          err&&h("p",{style:{color:"#ef4444",fontSize:12,margin:"5px 0 0",fontWeight:600}},"Senha incorreta"),
          h("button",{onClick:function(){if(pass==="nobre2025")setNivel("gerente");else if(pass==="balcao")setNivel("atendente");else if(pass==="cozinha")setNivel("cozinha");else{setErr(true);setTimeout(function(){setErr(false);},2000);}setPass("");},style:{width:"100%",marginTop:12,background:R,color:"#fff",border:"none",borderRadius:11,padding:"13px 0",fontSize:14,fontWeight:800,cursor:"pointer"}},"Entrar")
        )
      )
    );
  }

  var TABS=nivel==="gerente"?[["pedidos","Pedidos",pending],["cozinha","Cozinha",cooking],["cardapio","Cardapio",0]]:nivel==="cozinha"?[["cozinha","Cozinha",cooking]]:[["pedidos","Pedidos",pending],["cozinha","Cozinha",cooking]];

  return h("div",{style:{background:"#f4f6f9",minHeight:"100vh",maxWidth:480,margin:"0 auto"}},
    h("div",{style:{background:R,padding:"11px 15px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("p",{style:{margin:0,color:"#fff",fontSize:15,fontWeight:900,fontFamily:"Georgia,serif"}},"Nobre Bistro Admin"),
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("span",{style:{background:"rgba(255,255,255,.15)",color:"rgba(255,255,255,.85)",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:18,textTransform:"uppercase"}},nivel),
        h("button",{onClick:function(){setNivel(null);},style:{background:"rgba(255,255,255,.18)",border:"none",color:"#fff",fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:9,cursor:"pointer"}},"Sair")
      )
    ),
    h("div",{style:{display:"flex",background:"#fff",borderBottom:"1px solid "+B}},
      TABS.map(function(t){var a=tab===t[0];return h("button",{key:t[0],onClick:function(){setTab(t[0]);},style:{flex:1,padding:"10px 8px",border:"none",borderBottom:"2.5px solid "+(a?R:"transparent"),background:"#fff",color:a?R:"#666",fontSize:11,fontWeight:a?800:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",justifyContent:"center",gap:3}},
        t[1],
        t[2]>0&&h("span",{style:{background:"#ef4444",color:"#fff",fontSize:9,fontWeight:800,borderRadius:10,padding:"1px 5px"}},t[2])
      );})
    ),
    tab==="pedidos"&&h(PedidosAdmin,{orders:orders,setOrders:setOrders}),
    tab==="cozinha"&&h(CozinhaAdmin,{orders:orders,setOrders:setOrders}),
    tab==="cardapio"&&nivel==="gerente"&&h(CardapioAdmin,{prods:prods,setProds:setProds})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
