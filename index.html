function getStatusLoja(horarios,fechamentoManual){
  if(fechamentoManual)return{aberto:false,motivo:"Fechado temporariamente",proximo:null};
  var agora=new Date(),dia=agora.getDay(),hh=agora.getHours()*60+agora.getMinutes();
  var h=(horarios||HORARIOS_DEFAULT)[dia];
  if(!h||!h.aberto){
    var prox=null;
    for(var d=1;d<=7;d++){var nx=(dia+d)%7;var hn=(horarios||HORARIOS_DEFAULT)[nx];if(hn&&hn.aberto){prox=DIAS[nx]+" as "+hn.abre;break;}}
    return{aberto:false,motivo:"Fechado hoje",proximo:prox};
  }
  var pa=h.abre.split(":"),pf=h.fecha.split(":");
  var ma=parseInt(pa[0])*60+parseInt(pa[1]||0),mf=parseInt(pf[0])*60+parseInt(pf[1]||0);
  if(hh>=ma&&hh<mf)return{aberto:true,motivo:"Aberto ate "+h.fecha};
  if(hh<ma)return{aberto:false,motivo:"Abre hoje as "+h.abre,proximo:"Hoje as "+h.abre};
  var prox2=null;
  for(var d2=1;d2<=7;d2++){var nx2=(dia+d2)%7;var hn2=(horarios||HORARIOS_DEFAULT)[nx2];if(hn2&&hn2.aberto){prox2=DIAS[nx2]+" as "+hn2.abre;break;}}
  return{aberto:false,motivo:"Encerrado por hoje",proximo:prox2};
}

function calcCMV(p){
  var price=parseFloat(p.price)||0;
  if(!p.ingredients||!p.ingredients.length)return{custo:0,pct:0,cmvPct:0,lucro:price,margem:price>0?100:0};
  var c=p.ingredients.reduce(function(s,i){return s+(i.qtd*i.custoUn);},0);
  var pct=price?(c/price*100):0;
  return{custo:c,pct:pct,cmvPct:pct,lucro:price-c,margem:price>0?((price-c)/price*100):0};
}

function playNotification(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach(function(d){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+d+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+0.28);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.3);
    });
  }catch(e){}
}

function applyMenuEngineering(prods,orders){
  if(!orders||!orders.length)return prods;
  var done=orders.filter(function(o){return o.status==="concluido";});
  if(!done.length)return prods;
  var stats={};
  done.forEach(function(o){(o.items||[]).forEach(function(i){if(!stats[i.name])stats[i.name]={qty:0};stats[i.name].qty+=i.qty;});});
  var names=Object.keys(stats);
  var avgQty=names.length?names.reduce(function(s,n){return s+stats[n].qty;},0)/names.length:1;
  function getCMV(p){var r=calcCMV(p);return r.cmvPct;}
  var cmvVals=prods.map(getCMV).filter(function(v){return v>0;});
  var avgCMV=cmvVals.length?cmvVals.reduce(function(s,v){return s+v;},0)/cmvVals.length:35;
  var ORD={estrela:0,enigma:1,cavalo:2,abacaxi:3};
  return prods.map(function(p){
    var qty=stats[p.name]?stats[p.name].qty:0;
    var cmv=getCMV(p);
    var pop=qty>=avgQty,mar=cmv<=avgCMV;
    var cl=pop&&mar?"estrela":pop&&!mar?"cavalo":!pop&&mar?"enigma":"abacaxi";
    var tAuto=null,tcAuto=null;
    if(cl==="estrela"&&!p.tag){tAuto="Mais Pedido";tcAuto="#b91c1c";}
    if(cl==="enigma"&&!p.tag){tAuto="Chef Indica";tcAuto="#92400e";}
    return Object.assign({},p,{_cl:cl,_ord:ORD[cl],_tAuto:tAuto,_tcAuto:tcAuto});
  }).sort(function(a,b){return a._ord-b._ord;});
}

function useCart(){
  var _s=useState([]),items=_s[0],setItems=_s[1];
  function add(p,qty,obs){
    setItems(function(prev){
      var k=p.id+"_"+(obs||"");
      var ex=prev.find(function(i){return i._key===k;});
      if(ex)return prev.map(function(i){return i._key===k?Object.assign({},i,{qty:i.qty+qty}):i;});
      return prev.concat([Object.assign({},p,{qty:qty||1,obs:obs||"",_key:k})]);
    });
  }
  function inc(k){setItems(function(prev){return prev.map(function(i){return i._key===k?Object.assign({},i,{qty:i.qty+1}):i;});});}
  function dec(k){setItems(function(prev){return prev.map(function(i){return i._key===k&&i.qty>1?Object.assign({},i,{qty:i.qty-1}):i;}).filter(function(i){return i.qty>0;});});}
  function clear(){setItems([]);}
  var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  var count=items.reduce(function(s,i){return s+i.qty;},0);
  return{items:items,add:add,inc:inc,dec:dec,clear:clear,total:total,count:count};
}

function Modal(props){

  function handleOrderSent(order){
    setOrders(function(prev){return prev.concat([order]);});
    setProducts(function(prev){return prev.map(function(p){
      var item=order.items.find(function(i){return i.id===p.id;});
      if(!item)return p;
      return Object.assign({},p,{stock:Math.max(0,(p.stock||0)-item.qty)});
    });});
    cart.clear();
    setShowCart(false);
  }

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:CREAM}}>
    <div style={{textAlign:"center"}}>
      <div style={{fontFamily:"Georgia,serif",fontSize:13,letterSpacing:3,color:R,marginBottom:8}}>Nobre Bistro</div>
      <div style={{width:28,height:28,border:"2.5px solid "+BORDER,borderTop:"2.5px solid "+R,borderRadius:"50%",margin:"0 auto",animation:"spin .7s linear infinite"}}/>
    </div>
  </div>;

  var statusLoja=getStatusLoja(horarios,fechamentoManual);
  if(mode==="login")return <Login onLogin={function(n){setAuth(true);setNivel(n);setMode("menu");}}/>;
  if(mode==="admin"||mode==="atendente")return <div style={{fontFamily:"Nunito,sans-serif",background:CREAM,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><style>{CSS_ADMIN}</style><div style={{textAlign:"center",maxWidth:300}}><div style={{fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,letterSpacing:4,color:R,textTransform:"uppercase",marginBottom:4}}>Nobre</div><div style={{height:1,background:R,margin:"3px 34px 16px"}}></div><p style={{fontSize:14,fontWeight:700,color:"#1a1a1a",marginBottom:6}}>Painel Admin</p><p style={{fontSize:12,color:"#888",marginBottom:16,lineHeight:1.5}}>Autenticado como: {nivel}</p><p style={{fontSize:11,color:"#aaa",marginBottom:20}}>Abra o arquivo nobre-admin.jsx para acessar o painel completo.</p><button onClick={function(){setMode("menu");}} style={{background:R,color:"#fff",border:"none",borderRadius:11,padding:"12px 24px",fontSize:13,fontWeight:800,cursor:"pointer"}}>Voltar ao Cardapio</button></div></div>;
  if(!statusLoja.aberto)return <TelaFechada status={statusLoja} produtos={products}/>;

  return <div style={{fontFamily:"Nunito,sans-serif"}}>
    <style>{CSS_CLIENT}</style>
    <ClienteMenu products={products} categories={INIT_CATS} orders={orders} cartCount={cart.count} cartTotal={cart.total} onAdd={cart.add} onViewCart={function(){setShowCart(true);}} horarios={horarios} fechamentoManual={fechamentoManual}/>
    {showCart&&<CartDrawer cartItems={cart.items} cartTotal={cart.total} cartCount={cart.count} onInc={cart.inc} onDec={cart.dec} onClose={function(){setShowCart(false);}} onOrderSent={handleOrderSent} profs={profs}/>}
    <AdminBtn auth={auth} nivel={nivel} onGerente={function(){auth&&nivel==="gerente"?setMode("admin"):setMode("login");}} onAtendente={function(){auth&&nivel==="atendente"?setMode("atendente"):setMode("login");}} onCozinha={function(){setMode("cozinha");}}/>
  </div>;
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
